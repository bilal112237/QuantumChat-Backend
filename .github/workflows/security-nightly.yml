name: L5 Nightly Deep Fuzz

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  deep-fuzz:
    name: Deep Fuzz and Stress
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache MongoDB test binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-7.0.24-${{ runner.os }}

      - name: Install dependencies
        run: npm ci

      - name: Run nightly security depth suite
        run: npm run test:security:nightly
        env:
          SECURITY_FUZZ_KEYS: '1000'

      - name: Run E2E X5 invariants (nightly)
        run: npm run test:security:x5


      - name: Upload TAP log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-security-report
          path: |
            *.txt
          if-no-files-found: ignore
